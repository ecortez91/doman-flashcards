<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano 🎹</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .back { position: absolute; top: 20px; left: 20px; font-size: 2em; text-decoration: none; }
  h1 { color: white; font-size: 2.5em; margin: 20px 0; }
  .piano { display: flex; justify-content: center; margin: 20px; }
  .key {
    width: 70px; height: 250px; background: white; border: 2px solid #333;
    border-radius: 0 0 12px 12px; cursor: pointer; display: flex;
    align-items: flex-end; justify-content: center; padding-bottom: 15px;
    font-size: 1.2em; font-weight: bold; color: #666;
    transition: background 0.1s;
  }
  .key:active, .key.active { background: linear-gradient(180deg, #ddd, #FFD700); }
  .key .note-name { font-size: 1.4em; color: #CC0000; font-weight: bold; }
  #note-display { color: white; font-size: 3em; margin-top: 20px; min-height: 60px; }
  
  @media (max-width: 600px) {
    .key { width: 50px; height: 180px; }
  }
</style>
</head>
<body>
<a href="index.html" class="back">🏠</a>
<h1>🎹 Piano</h1>
<div class="piano" id="piano"></div>
<div id="note-display"></div>

<script>
const notes = [
  { name: 'DO', color: '#FF6B6B', freq: 261.63 },
  { name: 'RE', color: '#FFE66D', freq: 293.66 },
  { name: 'MI', color: '#4ECDC4', freq: 329.63 },
  { name: 'FA', color: '#FF8C42', freq: 349.23 },
  { name: 'SOL', color: '#7B68EE', freq: 392.00 },
  { name: 'LA', color: '#FF69B4', freq: 440.00 },
  { name: 'SI', color: '#00CED1', freq: 493.88 },
  { name: 'DO', color: '#FF4757', freq: 523.25 }
];

const ctx = new (window.AudioContext || window.webkitAudioContext)();
const piano = document.getElementById('piano');

notes.forEach((n, i) => {
  const key = document.createElement('div');
  key.className = 'key';
  key.innerHTML = '<span class="note-name">' + n.name + '</span>';
  key.style.borderBottom = '8px solid ' + n.color;
  
  function play() {
    ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = n.freq;
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 1);
    key.classList.add('active');
    document.getElementById('note-display').innerHTML = '<span style="color:'+n.color+'">♪ ' + n.name + '</span>';
    setTimeout(() => key.classList.remove('active'), 300);
  }
  
  key.addEventListener('touchstart', (e) => { e.preventDefault(); play(); });
  key.addEventListener('mousedown', play);
  piano.appendChild(key);
});
</script>
</body>
</html>
