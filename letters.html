<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abecedario 🔤</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f5f0ff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  .back { position: absolute; top: 20px; left: 20px; font-size: 2em; text-decoration: none; }
  h1 { font-size: 2.5em; margin: 20px 0; }
  #letter { font-size: 12em; font-weight: bold; color: #CC0000; margin: 10px 0; line-height: 1; }
  #word { font-size: 2em; color: #555; }
  #word-en { font-size: 1.3em; color: #999; margin-bottom: 10px; }
  #emoji { font-size: 5em; margin: 10px 0; }
  .nav { display: flex; gap: 30px; margin-top: 15px; }
  .nav-btn { font-size: 3em; padding: 15px 35px; border-radius: 20px; border: none; background: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  .nav-btn:active { transform: scale(0.9); }
  #counter { font-size: 1.3em; color: #888; margin-top: 10px; }
</style>
</head>
<body>
<a href="index.html" class="back">🏠</a>
<h1>🔤 Abecedario</h1>
<div id="letter"></div>
<div id="emoji"></div>
<div id="word"></div>
<div id="word-en"></div>
<div class="nav">
  <button class="nav-btn" onclick="prev()">⬅️</button>
  <button class="nav-btn" onclick="sayIt()">🔊</button>
  <button class="nav-btn" onclick="next()">➡️</button>
</div>
<div id="counter"></div>

<script>
const abc = [
  {l:'A',es:'ABEJA',en:'Bee',e:'🐝'},{l:'B',es:'BALLENA',en:'Whale',e:'🐋'},
  {l:'C',es:'CASA',en:'House',e:'🏠'},{l:'D',es:'DELFÍN',en:'Dolphin',e:'🐬'},
  {l:'E',es:'ESTRELLA',en:'Star',e:'⭐'},{l:'F',es:'FLOR',en:'Flower',e:'🌸'},
  {l:'G',es:'GATO',en:'Cat',e:'🐱'},{l:'H',es:'HELADO',en:'Ice cream',e:'🍦'},
  {l:'I',es:'IGUANA',en:'Iguana',e:'🦎'},{l:'J',es:'JIRAFA',en:'Giraffe',e:'🦒'},
  {l:'K',es:'KOALA',en:'Koala',e:'🐨'},{l:'L',es:'LUNA',en:'Moon',e:'🌙'},
  {l:'M',es:'MARIPOSA',en:'Butterfly',e:'🦋'},{l:'N',es:'NUBE',en:'Cloud',e:'☁️'},
  {l:'Ñ',es:'ÑANDÚ',en:'Rhea',e:'🐦'},{l:'O',es:'OSO',en:'Bear',e:'🐻'},
  {l:'P',es:'PERRO',en:'Dog',e:'🐶'},{l:'Q',es:'QUESO',en:'Cheese',e:'🧀'},
  {l:'R',es:'RANA',en:'Frog',e:'🐸'},{l:'S',es:'SOL',en:'Sun',e:'☀️'},
  {l:'T',es:'TORTUGA',en:'Turtle',e:'🐢'},{l:'U',es:'UVA',en:'Grape',e:'🍇'},
  {l:'V',es:'VACA',en:'Cow',e:'🐄'},{l:'W',es:'WAFLE',en:'Waffle',e:'🧇'},
  {l:'X',es:'XILÓFONO',en:'Xylophone',e:'🎵'},{l:'Y',es:'YATE',en:'Yacht',e:'⛵'},
  {l:'Z',es:'ZAPATO',en:'Shoe',e:'👟'}
];
let idx = 0;

function show() {
  const a = abc[idx];
  document.getElementById('letter').textContent = a.l;
  document.getElementById('emoji').textContent = a.e;
  document.getElementById('word').textContent = a.es;
  document.getElementById('word-en').textContent = a.en;
  document.getElementById('counter').textContent = (idx+1) + ' / ' + abc.length;
}
function sayIt() {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(abc[idx].l + '. ' + abc[idx].es);
    u.lang = 'es-ES'; u.rate = 0.7;
    speechSynthesis.speak(u);
  }
}
function next() { idx = (idx+1) % abc.length; show(); }
function prev() { idx = (idx-1+abc.length) % abc.length; show(); }
show();
</script>
</body>
</html>
